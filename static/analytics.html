<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics Dashboard - Python Lawn</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #dbeafe;
      --secondary: #64748b;
      --accent: #0f172a;
      --light: #f8fafc;
      --dark: #1e293b;
      --white: #ffffff;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1e293b;
      --gray-900: #0f172a;
      --success: #16a34a;
      --warning: #ea580c;
      --danger: #dc2626;
      --text-primary: #0f172a;
      --text-secondary: #4b5563;
      --border-color: #e5e7eb;
      --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f9fafb;
      color: var(--text-primary);
      line-height: 1.6;
    }

    /* NAVBAR */
    .navbar {
      background: white;
      box-shadow: var(--shadow-md);
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid var(--border-color);
    }

    .navbar-content {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar-left {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
    }

    .navbar-nav {
      display: flex;
      gap: 2rem;
      align-items: center;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .navbar-nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      border-radius: 0.375rem;
    }

    .navbar-nav a:hover {
      color: var(--primary);
      background-color: rgba(30, 64, 175, 0.05);
    }

    /* USER DISPLAY */
    .user-display {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-left: auto;
      padding-left: 1.5rem;
      border-left: 1px solid var(--border-color);
    }

    .user-info {
      text-align: right;
    }

    .user-name {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 0.9rem;
    }

    .user-location {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .user-icon {
      font-size: 1.5rem;
      color: var(--primary);
    }

    .logout-btn {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
    }

    .logout-btn:hover {
      color: var(--danger);
    }

    /* CONTAINER */
    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 2rem;
    }

    .page-header {
      margin-bottom: 2rem;
    }

    .page-title {
      font-size: 2rem;
      font-weight: 800;
      color: var(--secondary);
      margin: 0 0 0.5rem 0;
    }

    .page-subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin: 0;
    }

    .filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border-color);
      background: white;
      color: var(--text-secondary);
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .filter-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(30, 64, 175, 0.02);
    }

    .filter-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border-color);
      margin-bottom: 2rem;
    }

    .tab-btn {
      background: none;
      border: none;
      padding: 1rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
      margin-bottom: -2px;
    }

    .tab-btn:hover:not(.active) {
      color: var(--text-primary);
    }

    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* KPI CARDS */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .kpi-card {
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 0.75rem;
      padding: 1.5rem;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
    }

    .kpi-card:hover {
      box-shadow: var(--shadow-lg);
      border-color: var(--primary-light);
      transform: translateY(-2px);
    }

    .kpi-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.75rem;
    }

    .kpi-value {
      font-size: 2.25rem;
      font-weight: 800;
      color: var(--primary-dark);
      margin-bottom: 0.5rem;
      word-break: break-word;
    }

    .kpi-unit {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-left: 0.25rem;
    }

    .kpi-subtitle {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 0.75rem;
    }

    /* SECTION HEADER */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--border-color);
    }

    .section-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
    }

    .section-badge {
      background: rgba(30, 64, 175, 0.1);
      color: var(--primary-dark);
      padding: 0.375rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    /* CHARTS */
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .chart-container {
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 0.75rem;
      padding: 1.75rem;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      transition: all 0.3s ease;
    }

    .chart-container:hover {
      box-shadow: var(--shadow-lg);
      border-color: var(--primary-light);
    }

    .chart-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    canvas {
      display: block;
      max-height: 400px;
    }

    /* TABLES */
    .data-table {
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 0.75rem;
      overflow: hidden;
      margin-bottom: 2rem;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .data-table table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table thead {
      background: #f9fafb;
      border-bottom: 1px solid var(--border-color);
    }

    .data-table th {
      padding: 1rem;
      text-align: left;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .data-table td {
      padding: 1rem;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.95rem;
      color: var(--text-primary);
    }

    .data-table tbody tr:last-child td {
      border-bottom: none;
    }

    .data-table tbody tr:hover {
      background-color: #f9fafb;
    }

    .table-cell-badge {
      display: inline-block;
      padding: 0.375rem 0.75rem;
      border-radius: 0.375rem;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge-success {
      background-color: rgba(16, 185, 129, 0.1);
      color: #047857;
    }

    .badge-warning {
      background-color: rgba(245, 158, 11, 0.1);
      color: #d97706;
    }

    .badge-primary {
      background-color: rgba(30, 64, 175, 0.1);
      color: var(--primary-dark);
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
    }

    .empty-state i {
      font-size: 3rem;
      color: var(--border-color);
      margin-bottom: 1rem;
      display: block;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }

      .page-title {
        font-size: 1.5rem;
      }

      .kpi-grid {
        grid-template-columns: 1fr;
      }

      .chart-grid {
        grid-template-columns: 1fr;
      }

      .tabs {
        overflow-x: auto;
      }

      .navbar-nav {
        gap: 1rem;
      }

      .data-table {
        font-size: 0.85rem;
      }

      .data-table th,
      .data-table td {
        padding: 0.75rem;
      }
    }
  </style>
</head>

<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-content">
      <div class="navbar-left">
        <a href="/" class="navbar-brand">
          <i class="fas fa-leaf"></i> LawnOps
        </a>
        <ul class="navbar-nav">
          <li><a href="/"><i class="fas fa-home"></i> Dashboard</a></li>
          <li><a href="/routing.html"><i class="fas fa-route"></i> Routing</a></li>
          <li><a href="/owner"><i class="fas fa-cog"></i> Admin</a></li>
        </ul>
      </div>
      <div class="user-display">
        <div class="user-info">
          <div class="user-name" id="userName"></div>
          <div class="user-location" id="userLocation"></div>
        </div>
        <i class="fas fa-user-circle user-icon"></i>
        <a href="/logout" class="logout-btn" title="Logout"><i class="fas fa-sign-out-alt"></i></a>
      </div>
    </div>
  </nav>

  <!-- CONTAINER -->
  <div class="container">
    <!-- PAGE HEADER -->
    <div class="page-header">
      <h1 class="page-title">Analytics Dashboard</h1>
      <p class="page-subtitle">Performance metrics and insights across your operations</p>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="dashboard">
        <i class="fas fa-chart-line"></i> Dashboard
      </button>
    </div>

    <!-- ========== DASHBOARD (Office Worker View) ========== -->
    <div id="dashboard" class="tab-content active">
      <!-- TIME FILTERS -->
      <div class="filters">
        <button class="filter-btn active" onclick="setDashboardDays(7);">This Week</button>
        <button class="filter-btn" onclick="setDashboardDays(30);">This Month</button>
        <button class="filter-btn" onclick="setDashboardDays(1);">Today</button>
      </div>

      <!-- KPI CARDS - 4 SIMPLE METRICS -->
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label"><i class="fas fa-check-circle" style="color: var(--success);"></i> Completed</div>
          <div class="kpi-value"><span id="dash-completed">0</span>%</div>
          <div class="kpi-subtitle"><span id="dash-completed-count">0</span> of <span id="dash-total">0</span> jobs</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label"><i class="fas fa-redo" style="color: var(--warning);"></i> Reschedule</div>
          <div class="kpi-value"><span id="dash-reschedule">0</span>%</div>
          <div class="kpi-subtitle"><span id="dash-rescheduled-count">0</span> rescheduled</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label"><i class="fas fa-dollar-sign" style="color: var(--success);"></i> Revenue</div>
          <div class="kpi-value">$<span id="dash-actual-rev">0</span></div>
          <div class="kpi-subtitle">est: $<span id="dash-est-rev">0</span></div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label"><i class="fas fa-phone" style="color: var(--primary);"></i> Sales Today</div>
          <div class="kpi-value"><span id="dash-sales">0</span></div>
          <div class="kpi-subtitle">new customers</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "http://localhost:8000";
    let currentDashboardDays = 30;
    let currentUserType = null;
    let currentLocationId = null;

    document.addEventListener("DOMContentLoaded", () => {
      loadCurrentUser();
    });

    function setDashboardDays(days) {
      currentDashboardDays = days;
      document.querySelectorAll("#dashboard .filter-btn").forEach(b => b.classList.remove("active"));
      event.target.classList.add("active");
      loadDashboardData();
    }

    // ============ DASHBOARD DATA (Office Worker) ============
    async function loadDashboardData() {
      try {
        const response = await fetch(`${API_BASE}/analytics/office-dashboard?days=${currentDashboardDays}`);
        const data = await response.json();
        
        if (data.error) {
          console.error('Dashboard error:', data.error);
          return;
        }
        
        document.getElementById("dash-completed").textContent = data.completed_pct || 0;
        document.getElementById("dash-completed-count").textContent = data.completed || 0;
        document.getElementById("dash-total").textContent = data.total_scheduled || 0;
        document.getElementById("dash-reschedule").textContent = data.reschedule_pct || 0;
        document.getElementById("dash-rescheduled-count").textContent = data.rescheduled || 0;
        document.getElementById("dash-actual-rev").textContent = (data.actual_revenue || 0).toFixed(0);
        document.getElementById("dash-est-rev").textContent = (data.estimated_revenue || 0).toFixed(0);
        document.getElementById("dash-sales").textContent = data.sales_today || 0;
      } catch (error) {
        console.error("Dashboard data error:", error);
      }
    }

    // Load current user info
    async function loadCurrentUser() {
      try {
        const res = await fetch(`${API_BASE}/me`);
        const data = await res.json();
        
        if (data.authenticated) {
          const userNameEl = document.getElementById('userName');
          const userLocationEl = document.getElementById('userLocation');
          
          if (!userNameEl || !userLocationEl) {
            console.error('User display elements not found');
            return;
          }
          
          // Store user info globally
          currentUserType = data.user_type;
          currentLocationId = data.location_id;
          
          if (data.user_type === 'admin') {
            userNameEl.textContent = 'Admin';
            userLocationEl.textContent = data.username || '';
          } else if (data.user_type === 'office_worker') {
            userNameEl.textContent = data.worker_name || data.username;
            const locRes = await fetch(`${API_BASE}/locations`);
            const locData = await locRes.json();
            const location = locData.locations?.find(l => l.id === data.location_id);
            userLocationEl.textContent = location?.name || '';
          }
          
          // Load dashboard data for everyone
          loadDashboardData();
        }
      } catch (e) {
        console.error('Load current user error:', e);
      }
    }
  </script>
</body>
</html>
