<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routing – Lawn Care CRM</title>

    <!-- Leaflet CSS -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    />

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
    :root {
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --primary-light: #dbeafe;
        --secondary: #64748b;
        --accent: #0f172a;
        --light: #f8fafc;
        --dark: #1e293b;
        --white: #ffffff;
        --gray-50: #f8fafc;
        --gray-100: #f1f5f9;
        --gray-200: #e2e8f0;
        --gray-300: #cbd5e1;
        --gray-400: #94a3b8;
        --gray-500: #64748b;
        --gray-600: #475569;
        --gray-700: #334155;
        --gray-800: #1e293b;
        --gray-900: #0f172a;
        --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    /* NAVBAR */
    .navbar {
        background: var(--white);
        box-shadow: var(--shadow-md);
        padding: 1rem 0;
        position: sticky;
        top: 0;
        z-index: 1000;
        border-bottom: 1px solid var(--gray-200);
    }

    .navbar-content {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .navbar-left {
        display: flex;
        align-items: center;
        gap: 2rem;
    }

    .navbar-brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary);
        text-decoration: none;
    }

    .navbar-nav {
        display: flex;
        gap: 2rem;
        align-items: center;
        list-style: none;
        margin: 0;
        padding: 0;
    }

    .navbar-nav a {
        color: var(--gray-600);
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 0.75rem;
        border-radius: 0.375rem;
        transition: all 0.2s ease;
    }

    .navbar-nav a:hover {
        color: var(--primary);
        background-color: rgba(37, 99, 235, 0.05);
    }

    .navbar-nav a i {
        font-size: 0.9rem;
    }

    .user-display {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-left: auto;
        padding-left: 1.5rem;
        border-left: 1px solid var(--gray-200);
    }

    .user-info {
        text-align: right;
    }

    .user-name {
        font-weight: 600;
        color: var(--gray-900);
        font-size: 0.9rem;
    }

    .user-location {
        font-size: 0.75rem;
        color: var(--gray-500);
    }

    .user-icon {
        font-size: 1.5rem;
        color: var(--primary);
    }

    .logout-btn {
        color: var(--gray-500);
        text-decoration: none;
        font-size: 0.85rem;
    }

    .logout-btn:hover {
        color: #dc2626;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        min-height: 100vh;
        color: var(--gray-800);
        line-height: 1.6;
    }

    .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 2rem;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .header {
        background: var(--white);
        padding: 2.5rem;
        border-radius: 20px;
        box-shadow: var(--shadow-xl);
        text-align: center;
        border: 1px solid var(--gray-200);
        position: relative;
        overflow: hidden;
    }

    .header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--primary), var(--primary-dark));
    }

    .header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.75rem;
        letter-spacing: -0.025em;
    }

    .header p {
        color: var(--gray-600);
        font-size: 1.1rem;
        font-weight: 400;
        max-width: 600px;
        margin: 0 auto;
    }

    /* Layout: map on left, due list on right */
    .routing-layout {
        display: flex;
        gap: 1.5rem;
        flex: 1;
        min-height: 50vh;
    }

    /* Map container with fixed height */
    .map-container {
        flex: 2;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: var(--shadow-xl);
        border: 1px solid var(--gray-200);
        position: relative;
        background: var(--white);
    }

    .map-viewport {
        width: 100%;
        height: 600px;
        border-radius: 16px;
        overflow: hidden;
    }

    #map {
        width: 100%;
        height: 100%;
    }

    /* Right bar: one panel only */
    .right-panel {
        flex: 1;
        max-width: 380px;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    /* Customers Due Soon list on the right */
    .due-list {
        background: var(--white);
        padding: 1.75rem;
        border-radius: 16px;
        box-shadow: var(--shadow-xl);
        border: 1px solid var(--gray-200);
        position: relative;
    }

    .due-list::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--primary), var(--primary-dark));
        border-radius: 16px 16px 0 0;
    }

    .due-list h3 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 1.25rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--gray-800);
    }

    .customer-due-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 1rem;
        border-radius: 12px;
        margin-bottom: 0.75rem;
        background: var(--gray-50);
        border: 1px solid var(--gray-200);
        transition: all 0.2s ease;
    }

    .customer-due-row:hover {
        background: var(--primary-light);
        border-color: var(--primary);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
    }

    .customer-due-row label {
        flex: 1;
        cursor: pointer;
    }

    .days-since {
        font-size: 0.875rem;
        color: var(--gray-500);
        font-weight: 500;
    }

    /* Build Route button */
    .build-route-btn {
        margin-top: 1.5rem;
        width: 100%;
        padding: 1rem;
        font-size: 1rem;
        font-weight: 600;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: var(--white);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: var(--shadow-md);
        position: relative;
        overflow: hidden;
    }

    .build-route-btn:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
        background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    }

    .build-route-btn:active {
        transform: translateY(0);
        box-shadow: var(--shadow-md);
    }

    /* Custom marker style for blue non‑due pins */
    .custom-marker {
        background: none !important;
        border: none !important;
    }
</style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-left">
                <a href="/" class="navbar-brand">
                    <i class="fas fa-leaf"></i> LawnOps
                </a>
                <ul class="navbar-nav">
                    <li><a href="/"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li><a href="/analytics"><i class="fas fa-chart-line"></i> Analytics</a></li>
                    <li><a href="/owner"><i class="fas fa-cog"></i> Admin</a></li>
                </ul>
            </div>
            <div class="user-display">
                <div class="user-info">
                    <div class="user-name" id="userName"></div>
                    <div class="user-location" id="userLocation"></div>
                </div>
                <i class="fas fa-user-circle user-icon"></i>
                <a href="/logout" class="logout-btn" title="Logout"><i class="fas fa-sign-out-alt"></i></a>
            </div>
        </div>
    </nav>

    <div class="container" style="display: flex; flex-direction: column; height: calc(100vh - 70px); padding: 1rem; gap: 1rem;">
        <!-- Control Panel -->
        <div class="control-panel" style="background: var(--white); padding: 1rem; border-radius: 12px; box-shadow: var(--shadow-lg); flex-shrink: 0;">
            <div style="display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;">
                <!-- Due Today Metric -->
                <div style="background: linear-gradient(135deg, #fef3c7, #fde68a); padding: 0.5rem 1rem; border-radius: 8px; border-left: 4px solid #f59e0b; display: flex; align-items: center; gap: 0.5rem;">
                    <i class="fas fa-exclamation-circle" style="color: #d97706;"></i>
                    <div>
                        <div style="font-size: 0.75rem; color: #92400e; font-weight: 600;">DUE TODAY</div>
                        <div id="dueTodayCount" style="font-size: 1.25rem; font-weight: 700; color: #78350f;">0</div>
                    </div>
                </div>
                
                <button id="showTerritoriesBtn" class="btn btn-secondary" style="background: var(--accent); color: white; padding: 0.75rem 1rem;">
                    <i class="fas fa-map-marked-alt"></i> Show Territories
                </button>
                <button id="hideTerritoriesBtn" class="btn btn-secondary" style="background: var(--gray-500); color: white; display: none; padding: 0.75rem 1rem;">
                    <i class="fas fa-eye-slash"></i> Hide Territories
                </button>
                
                <!-- Layer Filter (shown when territories are visible) -->
                <div id="territoryLayerFilter" style="display: none; background: #f3f4f6; padding: 0.5rem 0.75rem; border-radius: 8px; border: 1px solid var(--gray-300);">
                    <label style="font-size: 0.85rem; color: var(--gray-600); margin-right: 0.5rem;">Layer:</label>
                    <label style="font-size: 0.8rem; margin-right: 0.75rem; cursor: pointer;">
                        <input type="radio" name="routingTerritoryLayer" value="all" checked onchange="switchRoutingTerritoryLayer(this.value)" style="vertical-align: middle;"> All
                    </label>
                    <label style="font-size: 0.8rem; margin-right: 0.75rem; cursor: pointer;">
                        <input type="radio" name="routingTerritoryLayer" value="chemical" onchange="switchRoutingTerritoryLayer(this.value)" style="vertical-align: middle;"> <i class="fas fa-flask" style="color: #16a34a;"></i> Chemical
                    </label>
                    <label style="font-size: 0.8rem; margin-right: 0.75rem; cursor: pointer;">
                        <input type="radio" name="routingTerritoryLayer" value="mowing" onchange="switchRoutingTerritoryLayer(this.value)" style="vertical-align: middle;"> <i class="fas fa-cut" style="color: #2563eb;"></i> Mowing
                    </label>
                    <label style="font-size: 0.8rem; cursor: pointer;">
                        <input type="radio" name="routingTerritoryLayer" value="pest" onchange="switchRoutingTerritoryLayer(this.value)" style="vertical-align: middle;"> <i class="fas fa-bug" style="color: #d97706;"></i> Pest
                    </label>
                </div>
                <div style="margin-left: auto; display: flex; gap: 0.5rem; align-items: center;">
                    <span style="font-size: 0.9rem; color: var(--gray-600);">Status:</span>
                    <span id="dailyRoutesStatus" style="padding: 0.25rem 0.75rem; background: var(--gray-100); border-radius: 20px; font-size: 0.85rem; color: var(--gray-600);">Not Generated</span>
                </div>
            </div>
        </div>

        <!-- Main Content: Map + Routes Side by Side -->
        <div style="display: flex; flex: 1; gap: 1rem; min-height: 0;">
            <!-- Left: Map -->
            <div style="flex: 2; display: flex; flex-direction: column; min-height: 0;">
                <div class="map-container" style="flex: 1; border-radius: 12px; overflow: hidden; box-shadow: var(--shadow-xl); border: 1px solid var(--gray-200);">
                    <div class="map-viewport" style="width: 100%; height: 100%;">
                        <div id="map"></div>
                    </div>
                </div>
            </div>

            <!-- Right: Routes Panel -->
            <div style="flex: 1; max-width: 450px; display: flex; flex-direction: column; min-height: 0;">
                <!-- Daily Routes Display -->
                <div id="dailyRoutesContainer" style="display: none; background: var(--white); border-radius: 12px; box-shadow: var(--shadow-lg); border-left: 4px solid #10b981; overflow: hidden; flex: 1; display: flex; flex-direction: column;">
                    <div style="padding: 1rem; border-bottom: 1px solid var(--gray-200); flex-shrink: 0;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <h3 style="margin: 0; color: var(--gray-800); font-size: 1.1rem;"><i class="fas fa-route" style="color: #10b981;"></i> Today's Routes</h3>
                            <div id="dailyRoutesSummary" style="font-size: 0.85rem; color: var(--gray-600);"></div>
                        </div>
                    </div>
                    <div id="dailyRoutesList" style="overflow-y: auto; padding: 1rem; flex: 1;"></div>
                </div>

                <!-- Empty state -->
                <div id="emptyRoutesState" style="background: var(--white); border-radius: 12px; box-shadow: var(--shadow-lg); padding: 2rem; text-align: center; color: var(--gray-500);">
                    <i class="fas fa-route" style="font-size: 3rem; margin-bottom: 1rem; color: var(--gray-300);"></i>
                    <p>Click "Generate Today's Routes" to see optimized routes for each technician.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin="">
    </script>

    <script>
        // Global map variable
        let map = null;
        
        // Global variables for optimization
        let clusterMarkers = [];
        let routeMarkers = [];
        let currentSchedule = null;
        let clusterData = null;
        let territoryLayerGroup = null; // Layer group for territories
        let territoryMarkers = [];
        let technicianData = null;
        let dailyRoutesData = null; // Store routes for view route function
        let officeLocation = null;
        let currentTerritoryLayer = 'all'; // Current layer filter
        
        // Initialize map first with default view, then update based on user location
        function initMap() {
            // Create map with default center first
            map = L.map('map').setView([32.9346, -97.2251], 12); // Default to Keller
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }).addTo(map);
            
            // Try to get user's location from /me endpoint and update center
            fetch('/me')
                .then(res => res.json())
                .then(data => {
                    if (data.authenticated && data.location && data.location.lat && data.location.lng) {
                        // Use user's office location
                        map.setView([data.location.lat, data.location.lng], 12);
                        console.log(`Routing map centered on user's location: ${data.location.name}`);
                        
                        // Add home/office icon at user's location
                        const homeIcon = L.divIcon({
                            html: '<div style="background: #3b82f6; color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 16px; border: 3px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.3);"><i class="fas fa-home"></i></div>',
                            iconSize: [30, 30],
                            iconAnchor: [15, 15],
                            className: 'home-icon'
                        });
                        
                        L.marker([data.location.lat, data.location.lng], {icon: homeIcon})
                            .addTo(map)
                            .bindPopup(`<strong>${data.location.name}</strong><br>${data.location.address}`);
                    } else {
                        console.log('Routing map centered on default Keller location');
                    }
                })
                .catch(err => {
                    console.log('Error getting user location, using default Keller:', err);
                });
        }
        
        // Initialize the map immediately
        initMap();
        
        // Load user info and customers on page load
        loadCurrentUser();
        fetchCustomers();

        // 🧠 SaaS Route Optimization Functions
        async function optimizeRoutes() {
            const optimizeBtn = document.getElementById('optimizeBtn');
            
            optimizeBtn.disabled = true;
            optimizeBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Optimizing...';
            
            try {
                const res = await fetch("/optimize_routes", {method: "POST"});
                const data = await res.json();
                
                if (data.status === 'success') {
                    currentSchedule = data.data;
                    updateMetrics(data.data.metrics);
                    
                    // Show success message
                    showNotification('Routes optimized successfully!', 'success');
                    
                    // Refresh customer data to show updated schedule
                    await fetchCustomers();
                } else {
                    throw new Error(data.message);
                }
            } catch (error) {
                console.error('Optimization error:', error);
                showNotification('Optimization failed: ' + error.message, 'error');
            } finally {
                optimizeBtn.disabled = false;
                optimizeBtn.innerHTML = '<i class="fas fa-magic"></i> Optimize Routes (30 Days)';
            }
        }

        async function showClusters() {
            const showBtn = document.getElementById('showClustersBtn');
            const hideBtn = document.getElementById('hideClustersBtn');
            
            showBtn.disabled = true;
            showBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
            
            try {
                const res = await fetch("/route_clusters");
                const data = await res.json();
                
                if (data.status === 'success') {
                    clusterData = data.clusters;
                    displayClusters(data.clusters);
                    
                    showBtn.style.display = 'none';
                    hideBtn.style.display = 'inline-block';
                    
                    showNotification(`Found ${data.total_clusters} geographic clusters`, 'success');
                } else {
                    throw new Error(data.message);
                }
            } catch (error) {
                console.error('Cluster error:', error);
                showNotification('Failed to load clusters: ' + error.message, 'error');
            } finally {
                showBtn.disabled = false;
                showBtn.innerHTML = '<i class="fas fa-map-marked-alt"></i> Show Clusters';
            }
        }

        function hideClusters() {
            // Remove all cluster markers
            clusterMarkers.forEach(marker => map.removeLayer(marker));
            clusterMarkers = [];
            
            const showBtn = document.getElementById('showClustersBtn');
            const hideBtn = document.getElementById('hideClustersBtn');
            
            showBtn.style.display = 'inline-block';
            hideBtn.style.display = 'none';
        }

        function displayClusters(clusters) {
            // Clear existing cluster markers
            clusterMarkers.forEach(marker => map.removeLayer(marker));
            clusterMarkers = [];
            
            // Color palette for clusters
            const colors = ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899', '#06b6d4'];
            
            Object.entries(clusters).forEach(([clusterId, cluster], index) => {
                const color = colors[index % colors.length];
                
                // Add cluster center marker
                const centerMarker = L.circleMarker([cluster.center.lat, cluster.center.lng], {
                    radius: 15,
                    fillColor: color,
                    color: '#ffffff',
                    weight: 2,
                    opacity: 0.8,
                    fillOpacity: 0.3
                }).addTo(map);
                
                centerMarker.bindPopup(`
                    <div style="text-align: center;">
                        <strong>${clusterId}</strong><br>
                        <span style="color: ${color};">●</span> ${cluster.customer_count} customers
                    </div>
                `);
                
                clusterMarkers.push(centerMarker);
                
                // Add customer markers in cluster
                cluster.customers.forEach(customer => {
                    const customerMarker = L.circleMarker([customer.lat, customer.lng], {
                        radius: 8,
                        fillColor: color,
                        color: '#ffffff',
                        weight: 2,
                        opacity: 0.9,
                        fillOpacity: 0.7
                    }).addTo(map);
                    
                    customerMarker.bindPopup(`
                        <div>
                            <strong>${customer.name}</strong><br>
                            ${customer.address}<br>
                            <span style="color: ${color};">●</span> ${clusterId}<br>
                            Priority: ${customer.priority_score.toFixed(1)}
                        </div>
                    `);
                    
                    clusterMarkers.push(customerMarker);
                });
            });
        }

        function updateMetrics(metrics) {
            document.getElementById('scheduledCount').textContent = metrics.total_customers;
            document.getElementById('totalDistance').textContent = `${metrics.total_distance} mi`;
            document.getElementById('serviceTime').textContent = `${Math.round(metrics.total_time / 60)} hrs`;
            document.getElementById('fuelCost').textContent = `$${metrics.fuel_cost_estimate.toFixed(2)}`;
        }

        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 1rem 1.5rem;
                border-radius: 8px;
                color: white;
                font-weight: 500;
                z-index: 10000;
                animation: slideIn 0.3s ease;
                max-width: 300px;
            `;
            
            switch(type) {
                case 'success':
                    notification.style.background = '#10b981';
                    break;
                case 'error':
                    notification.style.background = '#ef4444';
                    break;
                default:
                    notification.style.background = '#3b82f6';
            }
            
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => document.body.removeChild(notification), 300);
            }, 3000);
        }

        // 🔧 Technician Territory Visualization
        async function loadTechnicianTerritories() {
            try {
                const response = await fetch("/technician_territories");
                const data = await response.json();
                
                if (data.status === 'success') {
                    technicianData = data.territories;
                    displayTerritories(data.territories);
                }
            } catch (error) {
                console.error('Error loading territories:', error);
            }
        }

        function displayTerritories(territories) {
            // Create layer group if not exists
            if (!territoryLayerGroup) {
                territoryLayerGroup = L.layerGroup().addTo(map);
            } else {
                territoryLayerGroup.clearLayers();
            }
            territoryMarkers = [];
            
            territories.forEach(territory => {
                let layer = null;
                
                // Check if territory has polygon coordinates (drawn territories)
                if (territory.polygon_coords) {
                    try {
                        const coords = JSON.parse(territory.polygon_coords);
                        if (coords && coords.length >= 3) {
                            // Draw polygon territory
                            layer = L.polygon(coords, {
                                color: territory.color_hex,
                                fillColor: territory.color_hex,
                                fillOpacity: 0.15,
                                weight: 2,
                                opacity: 0.4,
                                dashArray: '5, 5'
                            }).addTo(territoryLayerGroup);
                            
                            layer.bindPopup(`
                                <div style="text-align: center;">
                                    <strong>${territory.technician_name}</strong><br>
                                    <span style="color: ${territory.color_hex};">●</span> ${territory.service_type || 'chemical'} Territory
                                </div>
                            `);
                        }
                    } catch (e) {
                        console.log('Error parsing polygon for', territory.technician_name);
                    }
                }
                
                // If no polygon, use circle (auto-assigned territories)
                if (!layer) {
                    layer = L.circle([territory.center_lat, territory.center_lng], {
                        radius: territory.radius_miles * 1609.34, // Convert miles to meters
                        fillColor: territory.color_hex,
                        color: territory.color_hex,
                        weight: 2,
                        opacity: 0.3,
                        fillOpacity: 0.1
                    }).addTo(territoryLayerGroup);
                    
                    layer.bindPopup(`
                        <div style="text-align: center;">
                            <strong>${territory.technician_name}</strong><br>
                            <span style="color: ${territory.color_hex};">●</span> ${territory.territory_name}<br>
                            <small>${territory.service_type || 'chemical'} | ${territory.radius_miles} mile radius</small>
                        </div>
                    `);
                }
                
                // Store service type on layer for filtering
                layer.serviceType = territory.service_type || 'chemical';
                territoryMarkers.push(layer);
            });
            
            // Apply current layer filter
            switchRoutingTerritoryLayer(currentTerritoryLayer);
        }

        function hideTerritories() {
            if (territoryLayerGroup) {
                territoryLayerGroup.clearLayers();
            }
            territoryMarkers = [];
            document.getElementById('territoryLayerFilter').style.display = 'none';
        }
        
        function switchRoutingTerritoryLayer(selectedLayer) {
            currentTerritoryLayer = selectedLayer;
            
            if (!territoryLayerGroup) return;
            
            territoryLayerGroup.eachLayer(layer => {
                const layerServiceType = layer.serviceType || 'chemical';
                let show = false;
                
                if (selectedLayer === 'all') {
                    show = true;
                } else {
                    show = layerServiceType === selectedLayer;
                }
                
                // Show/hide using opacity
                if (layer.setStyle) {
                    layer.setStyle({ opacity: show ? 0.4 : 0, fillOpacity: show ? 0.15 : 0 });
                }
            });
            
            console.log(`Switched routing territory layer to: ${selectedLayer}`);
        }

        // Event listeners
        document.getElementById('showTerritoriesBtn').addEventListener('click', async () => {
            await loadTechnicianTerritories();
            document.getElementById('showTerritoriesBtn').style.display = 'none';
            document.getElementById('hideTerritoriesBtn').style.display = 'inline-block';
            document.getElementById('territoryLayerFilter').style.display = 'inline-block';
        });
        
        document.getElementById('hideTerritoriesBtn').addEventListener('click', () => {
            hideTerritories();
            document.getElementById('showTerritoriesBtn').style.display = 'inline-block';
            document.getElementById('hideTerritoriesBtn').style.display = 'none';
            document.getElementById('territoryLayerFilter').style.display = 'none';
            // Reset to All
            document.querySelector('input[name="routingTerritoryLayer"][value="all"]').checked = true;
            currentTerritoryLayer = 'all';
        });
        
        // Auto-generate routes on page load
        setTimeout(generateDailyRoutes, 500);

        // 🗓️ Daily Route Generation for Office Workers
        async function generateDailyRoutes() {
            const statusEl = document.getElementById('dailyRoutesStatus');
            const container = document.getElementById('dailyRoutesContainer');
            const list = document.getElementById('dailyRoutesList');
            const summary = document.getElementById('dailyRoutesSummary');
            
            statusEl.textContent = 'Generating...';
            statusEl.style.background = '#fef3c7';
            statusEl.style.color = '#92400e';
            
            try {
                const res = await fetch('/routing/daily-routes');
                const data = await res.json();
                
                if (data.status === 'success') {
                    // Display routes
                    container.style.display = 'flex';
                    dailyRoutesData = data.technician_routes;
                    officeLocation = data.office_location;
                    
                    // Hide empty state
                    document.getElementById('emptyRoutesState').style.display = 'none';
                    summary.innerHTML = `
                        <strong>${data.summary.total_technicians} techs</strong> | 
                        <strong>${data.summary.total_customers_assigned} customers</strong> | 
                        <strong>${data.summary.total_sqft.toLocaleString()} sqft</strong> | 
                        <strong>$${data.summary.total_revenue.toLocaleString()}</strong>
                    `;
                    
                    // Clear existing
                    list.innerHTML = '';
                    
                    // Display each technician's route
                    data.technician_routes.forEach(route => {
                        const card = document.createElement('div');
                        card.style.cssText = `
                            background: var(--gray-50);
                            border: 1px solid var(--gray-200);
                            border-radius: 12px;
                            padding: 1rem;
                            border-left: 4px solid ${route.technician_color || '#3b82f6'};
                        `;
                        
                        if (route.message) {
                            // No route (territory not assigned, etc.)
                            card.innerHTML = `
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <div>
                                        <strong style="color: ${route.technician_color || '#3b82f6'};">
                                            <i class="fas fa-user-hard-hat"></i> ${route.technician_name}
                                        </strong>
                                        <div style="color: var(--gray-500); font-size: 0.9rem; margin-top: 0.25rem;">
                                            ${route.message}
                                        </div>
                                    </div>
                                </div>
                            `;
                        } else {
                            // Valid route
                            const totalHours = Math.floor(route.total_time_minutes / 60);
                            const totalMinutes = Math.round(route.total_time_minutes % 60);
                            
                            card.innerHTML = `
                                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem;">
                                    <div>
                                        <strong style="color: ${route.technician_color || '#3b82f6'}; font-size: 1.1rem;">
                                            <i class="fas fa-user-hard-hat"></i> ${route.technician_name}
                                        </strong>
                                        <div style="display: flex; gap: 1rem; margin-top: 0.5rem; font-size: 0.85rem; color: var(--gray-600);">
                                            <span><i class="fas fa-users"></i> ${route.customer_count} customers</span>
                                            <span><i class="fas fa-ruler-combined"></i> ${route.total_sqft.toLocaleString()} sqft</span>
                                            <span><i class="fas fa-dollar-sign"></i> $${route.total_revenue.toLocaleString()}</span>
                                            <span><i class="fas fa-road"></i> ${route.total_drive_miles} mi</span>
                                            <span><i class="fas fa-clock"></i> ${totalHours}h ${totalMinutes}m</span>
                                        </div>
                                    </div>
                                    <button onclick="viewTechnicianRoute(${route.technician_id}, '${route.technician_name}')" class="btn btn-sm" style="background: ${route.technician_color || '#3b82f6'}; color: white; padding: 0.5rem 1rem; border-radius: 6px; border: none; cursor: pointer;">
                                        <i class="fas fa-map-marker-alt"></i> View Route
                                    </button>
                                </div>
                                ${route.remaining_due > 0 ? `<div style="font-size: 0.85rem; color: #f59e0b; margin-bottom: 0.5rem;"><i class="fas fa-exclamation-triangle"></i> ${route.remaining_due} more due customers not assigned (capacity limit)</div>` : ''}
                                <div style="font-size: 0.8rem; color: var(--gray-500);">
                                    ${route.customers.map((c, i) => {
                                        const serviceIcons = {
                                            'chemical': '<i class="fas fa-flask" style="color: #16a34a;" title="Chemical"></i>',
                                            'mowing': '<i class="fas fa-cut" style="color: #2563eb;" title="Mowing"></i>',
                                            'pest': '<i class="fas fa-bug" style="color: #d97706;" title="Pest Control"></i>'
                                        };
                                        const icons = (c.services || ['chemical']).map(s => serviceIcons[s] || '').join(' ');
                                        return `
                                        <div style="display: flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0;">
                                            <span style="background: ${route.technician_color || '#3b82f6'}; color: white; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold;">${i + 1}</span>
                                            <span>${c.name}</span>
                                            <span style="margin-left: 0.5rem; font-size: 0.75rem;">${icons}</span>
                                            <span style="margin-left: auto; color: var(--gray-400);">${c.sqft.toLocaleString()} sqft</span>
                                        </div>
                                        `;
                                    }).join('')}
                                </div>
                            `;
                        }
                        
                        list.appendChild(card);
                    });
                    
                    statusEl.textContent = 'Generated';
                    statusEl.style.background = '#dcfce7';
                    statusEl.style.color = '#166534';
                    
                    // Draw routes on map
                    drawDailyRoutesOnMap(data.technician_routes);
                    
                } else {
                    throw new Error(data.message || 'Failed to generate routes');
                }
            } catch (error) {
                console.error('Daily routes error:', error);
                statusEl.textContent = 'Error';
                statusEl.style.background = '#fee2e2';
                statusEl.style.color = '#dc2626';
            }
        }
        
        function drawDailyRoutesOnMap(routes) {
            console.log('Routes generated for', routes.length, 'technicians');
            
            // Clear existing route markers
            routeMarkers.forEach(marker => {
                if (map.hasLayer(marker)) {
                    map.removeLayer(marker);
                }
            });
            routeMarkers = [];
            
            // Just fit map to show all customer locations if there are any routes with customers
            const allLatLngs = [];
            routes.forEach(route => {
                if (route.customers) {
                    route.customers.forEach(c => {
                        if (c.lat && c.lng) allLatLngs.push([c.lat, c.lng]);
                    });
                }
            });
            
            if (allLatLngs.length > 0) {
                const bounds = L.latLngBounds(allLatLngs);
                map.fitBounds(bounds.pad(0.1));
            }
            
            console.log('Map fitted to', allLatLngs.length, 'customer locations');
        }
        
        function viewTechnicianRoute(technicianId, technicianName) {
            // Clear previous route highlights
            routeMarkers.forEach(marker => {
                if (map.hasLayer(marker)) {
                    map.removeLayer(marker);
                }
            });
            routeMarkers = [];
            
            // Find the technician's route data
            const route = dailyRoutesData?.find(r => r.technician_id === technicianId);
            if (!route || !route.customers || route.customers.length === 0) {
                showNotification('No route data for this technician', 'error');
                return;
            }
            
            const color = route.technician_color || '#3b82f6';
            const latlngs = [];
            
            // Start from office
            if (officeLocation && officeLocation.lat && officeLocation.lng) {
                latlngs.push([officeLocation.lat, officeLocation.lng]);
                
                // Add office marker
                const officeMarker = L.marker([officeLocation.lat, officeLocation.lng], {
                    icon: L.divIcon({
                        className: 'office-marker',
                        html: `<div style="background: #000; color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.4);">OFFICE</div>`,
                        iconSize: [32, 32],
                        iconAnchor: [16, 16]
                    }),
                    zIndexOffset: 2000
                }).addTo(map);
                
                officeMarker.bindPopup(`<div><strong>Office</strong><br>Start/End Point</div>`);
                routeMarkers.push(officeMarker);
            }
            
            // Add each customer stop
            route.customers.forEach((customer, index) => {
                if (!customer.lat || !customer.lng) return;
                
                latlngs.push([customer.lat, customer.lng]);
                
                // Add stop marker with letter (A, B, C...)
                const letter = String.fromCharCode(65 + index); // A=65, B=66, etc
                const marker = L.marker([customer.lat, customer.lng], {
                    icon: L.divIcon({
                        className: 'route-stop-marker',
                        html: `<div style="background: ${color}; color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.4);">${letter}</div>`,
                        iconSize: [28, 28],
                        iconAnchor: [14, 14]
                    }),
                    zIndexOffset: 1000
                }).addTo(map);
                
                marker.bindPopup(`
                    <div style="min-width: 180px;">
                        <strong style="font-size: 1.1rem;">${customer.name}</strong><br>
                        <span style="color: ${color};">●</span> ${technicianName}<br>
                        <strong>Stop ${letter}</strong> (${index + 1} of ${route.customers.length})<br>
                        ${customer.sqft.toLocaleString()} sqft | $${customer.actual_price || 0}
                    </div>
                `);
                
                routeMarkers.push(marker);
            });
            
            // Draw the route path (office -> A -> B -> C...)
            if (latlngs.length > 1) {
                const polyline = L.polyline(latlngs, {
                    color: '#000000',  // Black line
                    weight: 4,
                    opacity: 0.9,
                    lineCap: 'round',
                    lineJoin: 'round'
                }).addTo(map);
                
                routeMarkers.push(polyline);
                
                // Fit map to show the route
                const group = new L.featureGroup(routeMarkers);
                map.fitBounds(group.getBounds().pad(0.15));
                
                showNotification(`Showing route for ${technicianName}: ${route.customers.length} stops`, 'success');
            }
        }

        // Add CSS animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Fetch ALL customers and add a pin for each one (blue or red if due)
        async function fetchCustomers() {
            try {
                const res = await fetch("/customers");
                if (!res.ok) throw new Error("API error: " + res.status);

                const data = await res.json();
                const customers = data.customers || [];

                // Update Due Today count
                const dueCount = customers.filter(c => c[8] === "due").length;
                document.getElementById("dueTodayCount").textContent = dueCount;

                console.log("ALL customers (will all get pins):", customers);

                // Clear any existing markers
                map.eachLayer(layer => {
                    if (layer instanceof L.Marker) {
                        map.removeLayer(layer);
                    }
                });

                // Add a pin for EVERY customer (blue by default, red if due)
                customers.forEach((c) => {
                    const name    = c[0];
                    const address = c[1];
                    const sqft    = c[3];
                    const rowid   = c[9];
                    const lat     = c[10];
                    const lng     = c[11];
                    const status  = c[8]; // "due" or "not_due"

                    console.log("Adding pin for", name, "at", [lat, lng], "status:", status);

                    if (lat == null || lng == null || isNaN(lat) || isNaN(lng)) {
                        console.warn("Invalid coordinates for", name, lat, lng);
                        return;
                    }

                    // BUT: if the customer is "due", make the pin red; otherwise blue
                    const isDue = status === "due";
                    const color = isDue ? '#ef4444' : '#3b82f6';
                    const icon = L.divIcon({
                        className: "custom-marker",
                        html: `<div style="
                            background: ${color};
                            width: 10px; height: 10px;
                            border-radius: 50%;
                            border: 2px solid #ffffff;
                            box-shadow: 0 0 4px rgba(0,0,0,0.3);
                        "></div>`,
                        iconSize: [10, 10],
                        iconAnchor: [5, 5]
                    });

                    const marker = L.marker([lat, lng], { icon }).addTo(map);

                    const popupContent = `
                        <div>
                            <strong>${name}</strong><br>
                            ${address}<br>
                            ${sqft.toLocaleString()} sqft<br>
                            Status: ${status}
                        </div>
                    `;
                    marker.bindPopup(popupContent);

                    // Optional: click toggles checklist checkbox
                    marker.on("click", () => {
                        const cb = document.getElementById(`customer-${rowid}`);
                        if (cb) cb.checked = !cb.checked;
                    });
                });

            } catch (e) {
                console.error("Error fetching customers or adding markers:", e);
            }
        }

        // Load current user info and center map on their location
        async function loadCurrentUser() {
            try {
                const res = await fetch('/me');
                const data = await res.json();
                
                if (data.authenticated) {
                    const userNameEl = document.getElementById('userName');
                    const userLocationEl = document.getElementById('userLocation');
                    
                    if (data.user_type === 'admin') {
                        userNameEl.textContent = 'Admin';
                        userLocationEl.textContent = data.username || '';
                    } else if (data.user_type === 'office_worker') {
                        userNameEl.textContent = data.worker_name || data.username;
                        // Fetch location name
                        const locRes = await fetch('/locations');
                        const locData = await locRes.json();
                        const location = locData.locations?.find(l => l.id === data.location_id);
                        userLocationEl.textContent = location?.name || '';
                        
                        // Center map on user's location if coordinates available
                        if (data.location_lat && data.location_lng) {
                            map.setView([data.location_lat, data.location_lng], 12);
                            console.log('Map centered on', data.location_name, [data.location_lat, data.location_lng]);
                        }
                    }
                }
            } catch (e) {
                console.error('Load current user error:', e);
            }
        }
    </script>
</body>
</html>
