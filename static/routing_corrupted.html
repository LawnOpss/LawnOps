<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routing – Lawn Care CRM</title>

    <!-- Leaflet CSS -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    />

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
    :root {
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --primary-light: #dbeafe;
        --secondary: #64748b;
        --accent: #0f172a;
        --light: #f8fafc;
        --dark: #1e293b;
        --white: #ffffff;
        --gray-50: #f8fafc;
        --gray-100: #f1f5f9;
        --gray-200: #e2e8f0;
        --gray-300: #cbd5e1;
        --gray-400: #94a3b8;
        --gray-500: #64748b;
        --gray-600: #475569;
        --gray-700: #334155;
        --gray-800: #1e293b;
        --gray-900: #0f172a;
        --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        min-height: 100vh;
        color: var(--gray-800);
        line-height: 1.6;
    }

    .hamburger-menu {
        position: fixed;
        top: 1rem;
        left: 1rem;
        z-index: 1001;
    }

    .hamburger-btn {
        background: transparent;
        border: none;
        font-size: 1.5rem;
        color: var(--primary);
        cursor: pointer;
        padding: 0.5rem;
        border-radius: 8px;
        transition: background 0.2s ease;
        z-index: 1001;
    }

    .hamburger-btn:hover {
        background: #f1f5f9;
    }

    .hamburger-dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        width: 180px;
        background: var(--white);
        border-radius: 12px;
        box-shadow: var(--shadow-lg);
        padding: 0.5rem 0;
        margin: 0;
        list-style: none;
        display: none;
        border: 1px solid #e2e8f0;
        z-index: 1000;
    }

    .hamburger-dropdown.visible {
        display: block;
    }

    .hamburger-dropdown li a {
        display: block;
        padding: 0.75rem 1rem;
        text-decoration: none;
        color: var(--dark);
        transition: background 0.2s ease;
    }

    .hamburger-dropdown li a:hover {
        background: #f1f5f9;
    }

    .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 2rem;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .header {
        background: var(--white);
        padding: 2.5rem;
        border-radius: 20px;
        box-shadow: var(--shadow-xl);
        text-align: center;
        border: 1px solid var(--gray-200);
        position: relative;
        overflow: hidden;
    }

    .header::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--primary), var(--primary-dark));
    }

    .header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.75rem;
        letter-spacing: -0.025em;
    }

    .header p {
        color: var(--gray-600);
        font-size: 1.1rem;
        font-weight: 400;
        max-width: 600px;
        margin: 0 auto;
    }

    /* Layout: map on left, due list on right */
    .routing-layout {
        display: flex;
        gap: 1.5rem;
        flex: 1;
        min-height: 50vh;
    }

    /* Map container with fixed height */
    .map-container {
        flex: 2;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: var(--shadow-xl);
        border: 1px solid var(--gray-200);
        position: relative;
        background: var(--white);
    }

    .map-viewport {
        width: 100%;
        height: 600px;
        border-radius: 16px;
        overflow: hidden;
    }

    #map {
        width: 100%;
        height: 100%;
    }

    /* Right bar: one panel only */
    .right-panel {
        flex: 1;
        max-width: 380px;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    /* Customers Due Soon list on the right */
    .due-list {
        background: var(--white);
        padding: 1.75rem;
        border-radius: 16px;
        box-shadow: var(--shadow-xl);
        border: 1px solid var(--gray-200);
        position: relative;
    }

    .due-list::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--primary), var(--primary-dark));
        border-radius: 16px 16px 0 0;
    }

    .due-list h3 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 1.25rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--gray-800);
    }

    .customer-due-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 1rem;
        border-radius: 12px;
        margin-bottom: 0.75rem;
        background: var(--gray-50);
        border: 1px solid var(--gray-200);
        transition: all 0.2s ease;
    }

    .customer-due-row:hover {
        background: var(--primary-light);
        border-color: var(--primary);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md);
    }

    .customer-due-row label {
        flex: 1;
        cursor: pointer;
    }

    .days-since {
        font-size: 0.875rem;
        color: var(--gray-500);
        font-weight: 500;
    }

    /* Build Route button */
    .build-route-btn {
        margin-top: 1.5rem;
        width: 100%;
        padding: 1rem;
        font-size: 1rem;
        font-weight: 600;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: var(--white);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: var(--shadow-md);
        position: relative;
        overflow: hidden;
    }

    .build-route-btn:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
        background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    }

    .build-route-btn:active {
        transform: translateY(0);
        box-shadow: var(--shadow-md);
    }

    /* Custom marker style for blue non‑due pins */
    .custom-marker {
        background: none !important;
        </div>

        <div class="routing-layout">
            <div class="map-container">
                <div class="map-viewport">
                    <div id="map"></div>
                </div>
            </div>

            <div class="right-panel">
                <!-- Customers Due Soon list only -->
                <div class="due-list" id="dueList">
                    <h3>
                        <i class="fas fa-exclamation-triangle"></i>
                        Customers Due Soon (<span id="dueCount">0</span>)
                    </h3>
                    <p id="dueEmpty">Loading customers…</p>
                    <div id="dueCustomers"></div>
                    <button id="buildRoute" class="build-route-btn">
                        <i class="fas fa-route"></i> Build Route from Selected
                    </button>
                </div>

                <!-- Customers Not Due Yet list -->
                <div class="due-list" id="notDueList">
                    <h3>
                        <i class="fas fa-clock"></i>
                        Customers Not Due Yet 
                    </h3>
                    <p id="notDueEmpty">No customers not due yet.</p>
                    <div id="notDueCustomers"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin="">
    </script>

    <script>
        // Hamburger menu
        const hamburgerBtn = document.querySelector(".hamburger-btn");
        const hamburgerDropdown = document.querySelector(".hamburger-dropdown");

        if (hamburgerBtn && hamburgerDropdown) {
            hamburgerBtn.addEventListener("click", (e) => {
                e.preventDefault();
                e.stopPropagation();
                hamburgerDropdown.classList.toggle("visible");
            });

            document.addEventListener("click", (e) => {
                if (
                    hamburgerDropdown.classList.contains("visible") &&
                    !hamburgerDropdown.contains(e.target) &&
                    e.target !== hamburgerBtn
                ) {
                    hamburgerDropdown.classList.remove("visible");
                }
            });

            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape" && hamburgerDropdown.classList.contains("visible")) {
                    hamburgerDropdown.classList.remove("visible");
                }
            });
        }

        // Initialize Leaflet map
        const map = L.map('map').setView([32.84, -97.19], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // Fetch ALL customers and add a pin for each one (blue or red if due)
        async function fetchCustomers() {
            try {
                const res = await fetch("/customers");
                if (!res.ok) throw new Error("API error: " + res.status);

                const data = await res.json();
                const customers = data.customers || [];

                console.log("ALL customers (will all get pins):", customers);

                // Clear any existing markers
                map.eachLayer(layer => {
                    if (layer instanceof L.Marker) {
                        map.removeLayer(layer);
                    }
                });

                // Update the "due" list UI (still only due ones)
                const dueCount = document.getElementById("dueCount");
                const dueCustomersContainer = document.getElementById("dueCustomers");
                const dueEmpty = document.getElementById("dueEmpty");

                const due = customers.filter(c => c[8] === "due");
                dueCount.textContent = due.length;

                if (due.length === 0) {
                    dueEmpty.textContent = "No customers are due service right now.";
                    dueCustomersContainer.innerHTML = "";
                } else {
                    dueEmpty.remove();
                    dueCustomersContainer.innerHTML = due.map((c) => {
                        const name    = c[0];
                        const address = c[1];
                        const sqft    = c[3];
                        const rowid   = c[9];

                        return `
                            <div class="customer-due-row">
                                <input type="checkbox" id="customer-${rowid}" data-rowid="${rowid}" data-sqft="${sqft}">
                                <label for="customer-${rowid}">
                                    <strong>${name}</strong><br>
                                    <span>${address}</span>
                                </label>
                                <span class="days-since">
                                    ${sqft.toLocaleString()} sqft
                                </span>
                            </div>
                        `;
                    }).join("");
                }

                // Update the "not due" list UI
                const notDueCount = document.getElementById("notDueCount");
                const notDueCustomersContainer = document.getElementById("notDueCustomers");
                const notDueEmpty = document.getElementById("notDueEmpty");

                const notDue = customers.filter(c => c[8] !== "due");

                if (notDue.length === 0) {
                    notDueEmpty.textContent = "No customers not due yet.";
                    notDueCustomersContainer.innerHTML = "";
                } else {
                    notDueEmpty.remove();
                    notDueCustomersContainer.innerHTML = notDue.map((c) => {
                        const name    = c[0];
                        const address = c[1];
                        const sqft    = c[3];
                        const rowid   = c[9];

                        return `
                            <div class="customer-due-row">
                                <input type="checkbox" id="customer-${rowid}" data-rowid="${rowid}" data-sqft="${sqft}">
                                <label for="customer-${rowid}">
                                    <strong>${name}</strong><br>
                                    <span>${address}</span>
                                </label>
                                <span class="days-since">
                                    ${sqft.toLocaleString()} sqft
                                </span>
                            </div>
                        `;
                    }).join("");
                }

                                // Add a pin for EVERY customer (blue by default, red if due)
                customers.forEach((c) => {
                    const name    = c[0];
                    const address = c[1];
                    const sqft    = c[3];
                    const rowid   = c[9];
                    const lat     = c[10];
                    const lng     = c[11];
                    const status  = c[8]; // "due" or "not_due"

                    console.log("Adding pin for", name, "at", [lat, lng], "status:", status);

                    if (lat == null || lng == null || isNaN(lat) || isNaN(lng)) {
                        console.warn("Invalid coordinates for", name, lat, lng);
                        return;
                    }

                    // BUT: if the customer is "due", make the pin red; otherwise blue
                    const isDue = status === "due";
                    const color = isDue ? '#ef4444' : '#3b82f6';
                    const icon = L.divIcon({
                        className: "custom-marker",
                        html: `<div style="
                            background: ${color};
                            width: 10px; height: 10px;
                            border-radius: 50%;
                            border: 2px solid #ffffff;
                            box-shadow: 0 0 4px rgba(0,0,0,0.3);
                        "></div>`,
                        iconSize: [10, 10],
                        iconAnchor: [5, 5]
                    });

                    const marker = L.marker([lat, lng], { icon }).addTo(map);

                    const popupContent = `
                        <div>
                            <strong>${name}</strong><br>
                            ${address}<br>
                            ${sqft.toLocaleString()} sqft<br>
                            Status: ${status}
                        </div>
                    `;
                    marker.bindPopup(popupContent);

                    // Optional: click toggles checklist checkbox
                    marker.on("click", () => {
                        const cb = document.getElementById(`customer-${rowid}`);
                        if (cb) cb.checked = !cb.checked;
                    });
                });

            } catch (e) {
                console.error("Error fetching customers or adding markers:", e);
                const dueEmpty = document.getElementById("dueEmpty");
                if (dueEmpty) {
                    dueEmpty.textContent = "Error loading customers.";
                }
            }
        }

        // Build Route from selected customers - FIXED
        function setupBuildRouteButton() {
            const btn = document.getElementById("buildRoute");

            btn.addEventListener("click", async () => {
                const selected = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).reverse().map(cb => ({
                    rowid: parseInt(cb.dataset.rowid), 
                    sqft: parseInt(cb.dataset.sqft)
                }));
                if (selected.length > 0) {
                    await fetch("/build_route", {method: "POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({route:selected})});
                }
                window.location.href = "/Route_Printing.html";
            });
        }

        // Initialize on page load
        fetchCustomers();
        setupBuildRouteButton();
    </script>
</body>
</html>
